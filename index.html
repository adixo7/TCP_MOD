<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      // This happens when extensions or polyfills try to override window.fetch
      const originalFetch = window.fetch;
      if (originalFetch) {
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { console.warn('Ignored attempt to override window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
